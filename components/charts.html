<div class="p-8 grid grid-cols-2 gap-8">
  <div class="wf-border p-6 space-y-4">
    <h3 class="font-bold border-b border-slate-900 pb-2">Sales Overview</h3>
    <div class="w-full h-40 flex items-end gap-2 pb-4 border-b border-slate-300">
      <div class="bg-slate-900 w-full" style="height: 40%"></div>
      <div class="bg-slate-700 w-full" style="height: 70%"></div>
      <div class="bg-slate-400 w-full" style="height: 50%"></div>
      <div class="bg-slate-900 w-full" style="height: 90%"></div>
      <div class="bg-slate-200 w-full" style="height: 30%"></div>
    </div>
    <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase">
      <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span>
    </div>
  </div>
  <div class="wf-border p-6 space-y-4">
    <h3 class="font-bold border-b border-slate-900 pb-2">Distribution</h3>
    <div class="flex items-center justify-center h-40">
      <div class="w-32 h-32 wf-circle border-[16px] border-slate-900 relative">
        <div class="absolute inset-0 border-[16px] border-slate-200 rounded-full" style="clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 50%)"></div>
      </div>
    </div>
  </div>
</div>
