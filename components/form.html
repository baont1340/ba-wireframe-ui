<section class="max-w-2xl mx-auto px-6 py-20">
  <div class="wf-bg wf-border wf-shadow p-10 space-y-8">
    <div class="space-y-2">
      <h2 class="text-3xl">Contact Us</h2>
      <p class="text-slate-600">Fill out the form below and we'll get back to you shortly.</p>
    </div>
    <form class="space-y-6">
      <div class="space-y-2">
        <label class="font-bold block">Full Name</label>
        <input type="text" class="wf-input w-full" placeholder="John Doe">
      </div>
      <div class="space-y-2">
        <label class="font-bold block">Email Address</label>
        <input type="email" class="wf-input w-full" placeholder="john@example.com">
      </div>
      <div class="space-y-2">
        <label class="font-bold block">Message</label>
        <textarea class="wf-input w-full min-h-[120px]" placeholder="How can we help?"></textarea>
      </div>
      <button type="submit" class="wf-button w-full py-4 text-xl">Send Message</button>
    </form>
  </div>
</section>
