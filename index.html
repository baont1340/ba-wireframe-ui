<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BA Wireframe Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f1f5f9;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===================== SIDEBAR ===================== */
        #sidebar {
            width: 260px;
            flex-shrink: 0;
            background: white;
            border-right: 2px solid #0f172a;
            display: flex;
            flex-direction: column;
            height: 100vh;
            z-index: 10;
        }
        #sidebar-header {
            padding: 12px 14px;
            border-bottom: 2px solid #0f172a;
            background: white;
        }
        #sidebar-title {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        #component-search {
            width: 100%;
            padding: 6px 10px;
            border: 2px solid #0f172a;
            font-size: 12px;
            outline: none;
        }
        #component-search:focus { background: #f8fafc; }
        #sidebar-hint {
            font-size: 9px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 6px;
        }
        #component-list {
            flex: 1;
            overflow-y: auto;
        }
        .cat-header {
            padding: 5px 14px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #94a3b8;
            background: #f8fafc;
            border-bottom: 1px solid #f1f5f9;
            border-top: 1px solid #f1f5f9;
        }
        .comp-item {
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.1s;
            user-select: none;
        }
        .comp-item:hover { background: #f1f5f9; }
        .comp-item:active { background: #e2e8f0; }
        .comp-icon {
            width: 26px;
            height: 26px;
            border: 2px solid #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: white;
        }
        .comp-item:hover .comp-icon { background: #0f172a; color: white; }
        .comp-name { font-size: 11px; font-weight: 600; }

        /* ===================== MAIN ===================== */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ===================== TOOLBAR ===================== */
        #toolbar {
            height: 48px;
            background: white;
            border-bottom: 2px solid #0f172a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            gap: 12px;
            z-index: 10;
            flex-shrink: 0;
        }
        .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 8px; }
        .toolbar-divider { width: 1px; height: 18px; background: #e2e8f0; }
        #canvas-status { font-size: 11px; font-weight: 700; color: #64748b; }
        .tb-btn {
            padding: 4px 10px;
            border: 2px solid #0f172a;
            background: white;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.1s, color 0.1s;
        }
        .tb-btn:hover { background: #0f172a; color: white; }
        .tb-btn.danger:hover { background: #dc2626; border-color: #dc2626; }
        #zoom-display {
            font-size: 11px;
            font-weight: 700;
            font-family: monospace;
            min-width: 40px;
            text-align: center;
            color: #0f172a;
        }
        .zoom-btn {
            width: 26px;
            height: 26px;
            border: 2px solid #0f172a;
            background: white;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .zoom-btn:hover { background: #0f172a; color: white; }

        /* ===================== VIEWPORT ===================== */
        #viewport {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #e2e8f0;
            background-image: radial-gradient(circle, #94a3b8 1px, transparent 1px);
            background-size: 20px 20px;
            cursor: default;
        }
        #viewport.is-panning { cursor: grabbing !important; }

        /* The infinite world container */
        #world {
            position: absolute;
            top: 0; left: 0;
            transform-origin: 0 0;
            will-change: transform;
        }

        /* The white "page" canvas */
        #canvas-page {
            position: relative;
            width: 1440px;
            min-height: 960px;
            background: white;
            border: 2px solid #0f172a;
            box-shadow: 6px 6px 0 #0f172a;
            margin: 160px 0 0 160px;
        }
        #canvas-page::before {
            content: 'Canvas — 1440 × ∞';
            position: absolute;
            top: -22px;
            left: 0;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 0.06em;
        }

        /* ===================== CANVAS ITEMS ===================== */
        .c-item {
            position: absolute;
            background: white;
            min-width: 200px;
        }

        /* Drag handle bar */
        .c-drag-handle {
            height: 24px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            cursor: move;
            user-select: none;
        }
        .c-drag-dots {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .c-drag-dots span {
            width: 3px;
            height: 3px;
            background: #475569;
            border-radius: 50%;
        }
        .c-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #475569;
            text-transform: uppercase;
        }
        .c-controls {
            display: flex;
            gap: 3px;
        }
        .c-btn {
            width: 16px;
            height: 16px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            line-height: 1;
        }
        .c-btn:hover { background: #334155; color: white; }
        .c-btn.del:hover { background: #dc2626; border-color: #dc2626; }

        /* Component content area */
        .c-content {
            overflow: hidden;
        }

        /* Resize handle */
        .c-resize {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 14px;
            height: 14px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, #0f172a 50%);
        }

        /* Hover/selected state */
        .c-item:hover { outline: 1px dashed #94a3b8; }
        .c-item.selected { outline: 2px solid #0f172a; }

        /* ===================== EMPTY STATE ===================== */
        #empty-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            pointer-events: none;
            opacity: 0.5;
        }
        #empty-state .e-icon {
            width: 64px;
            height: 64px;
            border: 3px dashed #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #empty-state p { font-size: 13px; color: #94a3b8; font-weight: 600; }
        #empty-state small { font-size: 10px; color: #cbd5e1; }

        /* ===================== TOAST ===================== */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 8px 18px;
            font-size: 12px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<!-- ===================== SIDEBAR ===================== -->
<div id="sidebar">
    <div id="sidebar-header">
        <div id="sidebar-title">⬡ BA Wireframe Builder</div>
        <input id="component-search" type="text" placeholder="🔍  Search components...">
        <div id="sidebar-hint">Click or drag onto canvas</div>
    </div>
    <div id="component-list"></div>
</div>

<!-- ===================== MAIN ===================== -->
<div id="main">

    <!-- TOOLBAR -->
    <div id="toolbar">
        <div class="toolbar-left">
            <span id="canvas-status">Empty</span>
            <div class="toolbar-divider"></div>
            <!-- Zoom -->
            <button class="zoom-btn" id="btn-zoom-out" title="Zoom Out (Ctrl+Scroll)">−</button>
            <span id="zoom-display">70%</span>
            <button class="zoom-btn" id="btn-zoom-in" title="Zoom In (Ctrl+Scroll)">+</button>
            <button class="tb-btn" id="btn-zoom-fit" title="Fit to window">FIT</button>
            <div class="toolbar-divider"></div>
            <span style="font-size:10px;color:#94a3b8;font-weight:700;">PAN: Space+drag or middle-click</span>
        </div>
        <div class="toolbar-right">
            <button class="tb-btn danger" id="btn-clear">✕ Clear</button>
            <button class="tb-btn" id="btn-screenshot">
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Screenshot
            </button>
        </div>
    </div>

    <!-- VIEWPORT -->
    <div id="viewport">
        <div id="world">
            <div id="canvas-page">
                <div id="empty-state">
                    <div class="e-icon">
                        <svg width="24" height="24" fill="none" stroke="#94a3b8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <p>Click or drag components from sidebar</p>
                    <small>Ctrl+Scroll to zoom · Space+drag to pan · Drag handle to move</small>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast">Saved!</div>

<script src="js/main.js"></script>
</body>
</html>
