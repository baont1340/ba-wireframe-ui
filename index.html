<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BA Wireframe Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <!-- html2canvas for screenshots -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body class="flex bg-slate-100">

    <!-- Sidebar: Component Library -->
    <aside class="sidebar">
        <div class="p-6 border-b-2 border-slate-900 bg-white sticky top-0 z-10">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="w-6 h-6 wf-circle">W</span> Builder
            </h1>
            <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Component Library</p>
        </div>

        <div id="component-list" class="divide-y divide-slate-100">
            <!-- Components will be injected here -->
            <div class="p-8 text-center text-slate-400">Loading components...</div>
        </div>
    </aside>

    <!-- Main Content: Canvas & Toolbar -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Toolbar -->
        <header class="h-16 border-b-2 border-slate-900 bg-white flex items-center justify-between px-8 z-10">
            <div class="flex items-center gap-4">
                <span id="canvas-status" class="text-sm font-medium text-slate-500">Empty Canvas</span>
            </div>
            <div class="flex items-center gap-3">
                <button id="clear-canvas" class="text-slate-500 hover:text-red-600 px-3 py-1 font-bold text-sm">Clear</button>
                <button id="download-screenshot" class="wf-button py-1 px-4 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Screenshot
                </button>
            </div>
        </header>

        <!-- Canvas Area -->
        <div class="canvas-container scrollbar-hide">
            <div id="drop-zone" class="canvas">
                <!-- User built UI will go here -->
                <div id="canvas-empty-state" class="flex-1 flex flex-col items-center justify-center p-20 text-center space-y-4">
                    <div class="w-24 h-24 wf-placeholder border-4 border-slate-200">
                        <svg class="w-12 h-12 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-2xl text-slate-300">Start building your UI</h3>
                        <p class="text-slate-300">Click components on the left to add them here</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Context Menu or Notification Area if needed -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 wf-bg wf-border wf-shadow px-6 py-3 font-bold opacity-0 transition-opacity pointer-events-none">
        Copied to clipboard!
    </div>

    <script src="js/main.js"></script>
</body>

</html>
