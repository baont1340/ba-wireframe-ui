<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BA Wireframe Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #e2e8f0;
            color: #0f172a;
        }

        /* ===================== SIDEBAR ===================== */
        #sidebar {
            width: 260px;
            flex-shrink: 0;
            background: #fff;
            border-right: 2px solid #0f172a;
            display: flex;
            flex-direction: column;
            z-index: 20;
        }
        #sidebar-header {
            padding: 12px 14px;
            border-bottom: 2px solid #0f172a;
        }
        #sidebar-title {
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #sidebar-title .logo {
            width: 22px; height: 22px;
            background: #0f172a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
        }
        #component-search {
            width: 100%;
            padding: 6px 10px;
            border: 2px solid #0f172a;
            font-size: 12px;
            outline: none;
            font-family: inherit;
        }
        #component-search:focus { background: #f8fafc; }
        #sidebar-hint {
            font-size: 9px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 6px;
            font-weight: 600;
        }
        #component-list {
            flex: 1;
            overflow-y: auto;
        }
        .cat-header {
            padding: 5px 14px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #94a3b8;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }
        .comp-item {
            padding: 7px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: grab;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.1s;
            user-select: none;
            font-size: 11px;
            font-weight: 600;
        }
        .comp-item:hover { background: #f1f5f9; }
        .comp-item:active { cursor: grabbing; background: #e2e8f0; }
        .comp-icon {
            width: 24px; height: 24px;
            border: 2px solid #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: #fff;
            transition: background 0.1s, color 0.1s;
        }
        .comp-item:hover .comp-icon { background: #0f172a; color: #fff; }

        /* ===================== MAIN AREA ===================== */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ===================== TOOLBAR ===================== */
        #toolbar {
            height: 46px;
            background: #fff;
            border-bottom: 2px solid #0f172a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            flex-shrink: 0;
            gap: 6px;
            z-index: 10;
        }
        .tb-group { display: flex; align-items: center; gap: 6px; }
        .tb-sep { width: 1px; height: 18px; background: #e2e8f0; margin: 0 2px; }
        .tb-btn {
            padding: 4px 10px;
            border: 2px solid #0f172a;
            background: #fff;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.1s, color 0.1s;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .tb-btn:hover { background: #0f172a; color: #fff; }
        .tb-btn.active { background: #0f172a; color: #fff; }
        .tb-btn.danger:hover { background: #dc2626; border-color: #dc2626; }
        .tb-label {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        #canvas-status { font-size: 11px; font-weight: 700; color: #64748b; }
        #zoom-val {
            font-size: 11px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            min-width: 38px;
            text-align: center;
        }

        /* ===================== CANVAS VIEWPORT ===================== */
        #viewport {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 40px 20px 80px;
            background: #e2e8f0;
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* The page surface */
        #canvas {
            background: #fff;
            border: 2px solid #0f172a;
            box-shadow: 6px 6px 0 rgba(15,23,42,0.7);
            min-height: 600px;
            flex-shrink: 0;
            position: relative;
            transition: width 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        /* Size label */
        #canvas::before {
            content: attr(data-label);
            position: absolute;
            top: -24px;
            left: 0;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 0.06em;
        }

        /* ===================== DROP ZONE ===================== */
        #drop-zone {
            flex: 1;
            padding: 0;
            min-height: 300px;
            position: relative;
        }
        /* Drop indicator */
        .drop-indicator {
            height: 3px;
            background: #0f172a;
            position: relative;
            margin: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
        .drop-indicator::before {
            content: '';
            position: absolute;
            left: -4px;
            top: -4px;
            width: 10px;
            height: 10px;
            background: #0f172a;
            border-radius: 50%;
        }

        /* ===================== CANVAS ITEMS ===================== */
        .ci {
            position: relative;
            border: 1px solid transparent;
            transition: border-color 0.1s;
        }
        .ci:hover {
            border-color: #94a3b8;
        }
        .ci.drag-over-self {
            border-color: #0f172a;
            background: #f8fafc;
        }
        .ci.dragging {
            opacity: 0.4;
        }

        /* Header bar for each dropped component */
        .ci-bar {
            height: 22px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            cursor: grab;
            user-select: none;
        }
        .ci-bar:active { cursor: grabbing; }
        .ci-bar-left {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .ci-bar-left .dots {
            display: flex;
            gap: 2px;
        }
        .ci-bar-left .dots span {
            width: 3px; height: 3px;
            background: #475569;
            border-radius: 50%;
        }
        .ci-bar-label {
            font-size: 9px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .ci-btns { display: flex; gap: 2px; }
        .ci-btn {
            width: 16px; height: 16px;
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            line-height: 1;
            font-family: inherit;
        }
        .ci-btn:hover { background: #334155; color: #fff; }
        .ci-btn.del:hover { background: #dc2626; border-color: #dc2626; }

        /* Nested drop zone inside a component */
        .ci-content {
            position: relative;
        }
        .ci-content.nest-target {
            outline: 2px dashed #0f172a;
            outline-offset: -2px;
            background: rgba(241, 245, 249, 0.5);
        }

        /* ===================== IMAGE PLACEHOLDERS ===================== */
        .wf-img {
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 12px;
            min-height: 80px;
        }
        .wf-img svg { opacity: 0.5; }

        /* ===================== EMPTY STATE ===================== */
        #empty-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            pointer-events: none;
        }
        #empty-state .e-box {
            width: 56px; height: 56px;
            border: 3px dashed #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #empty-state p { font-size: 13px; color: #94a3b8; font-weight: 600; }
        #empty-state small { font-size: 10px; color: #cbd5e1; }

        /* ===================== TOAST ===================== */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 8px 20px;
            font-size: 12px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 9999;
        }

        /* ===================== WIREFRAME CLASSES ===================== */
        .wf-border { border: 2px solid #0f172a; }
        .wf-shadow { box-shadow: 4px 4px 0px 0px rgba(15,23,42,1); }
        .wf-bg { background: white; }
        .wf-placeholder { background: #f1f5f9; border: 2px dashed #94a3b8; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-weight: 500; }
        .wf-button { padding: 8px 16px; border: 2px solid #0f172a; background: white; font-weight: 700; cursor: pointer; transition: background 0.1s; }
        .wf-button:hover { background: #0f172a; color: white; }
        .wf-input { padding: 8px 16px; border: 2px solid #0f172a; outline: none; width: 100%; }
        .wf-circle { border-radius: 50%; }

        /* ===================== SCREENSHOT HELPER ===================== */
        .screenshot-mode .ci-bar,
        .screenshot-mode .ci-btn { display: none !important; }
        .screenshot-mode .ci { border-color: transparent !important; }
    </style>
</head>
<body>

<!-- ===================== SIDEBAR ===================== -->
<div id="sidebar">
    <div id="sidebar-header">
        <div id="sidebar-title">
            <div class="logo">W</div>
            BA Wireframe Builder
        </div>
        <input id="component-search" type="text" placeholder="🔍  Search components...">
        <div id="sidebar-hint">Click to add · Drag to reorder on canvas</div>
    </div>
    <div id="component-list"></div>
</div>

<!-- ===================== MAIN ===================== -->
<div id="main">
    <!-- TOOLBAR -->
    <div id="toolbar">
        <div class="tb-group">
            <span id="canvas-status">Empty</span>
            <div class="tb-sep"></div>

            <!-- Device presets -->
            <span class="tb-label">Size:</span>
            <button class="tb-btn device-btn" data-w="375" data-label="Mobile — 375px">📱 Mobile</button>
            <button class="tb-btn device-btn" data-w="768" data-label="Tablet — 768px">📟 Tablet</button>
            <button class="tb-btn device-btn active" data-w="1440" data-label="Desktop — 1440px">🖥️ Desktop</button>
            <button class="tb-btn device-btn" data-w="1920" data-label="Widescreen — 1920px">🖥️ Wide</button>

            <div class="tb-sep"></div>

            <!-- Zoom -->
            <button class="tb-btn" id="btn-zout">−</button>
            <span id="zoom-val">100%</span>
            <button class="tb-btn" id="btn-zin">+</button>
            <button class="tb-btn" id="btn-zfit">FIT</button>
        </div>
        <div class="tb-group">
            <button class="tb-btn danger" id="btn-clear">✕ Clear</button>
            <button class="tb-btn" id="btn-screenshot">📷 Screenshot</button>
        </div>
    </div>

    <!-- Viewport (scrollable) -->
    <div id="viewport">
        <div id="canvas" data-label="Desktop — 1440px" style="width:1440px;">
            <div id="drop-zone">
                <div id="empty-state">
                    <div class="e-box">
                        <svg width="20" height="20" fill="none" stroke="#cbd5e1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </div>
                    <p>Click components from sidebar to add</p>
                    <small>Drag handle (black bar) to reorder · Drop into other components to nest</small>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="js/main.js"></script>
</body>
</html>
